# nixpacks.toml — Railway build config для ReaTrack Backend
#
# Проблема: mediapipe залежить від opencv-contrib-python (GUI-версія),
# яка потребує libxcb.so.1 (X11). На headless-сервері Railway її немає.
#
# Рішення: після pip install примусово видаляємо GUI-OpenCV
# та встановлюємо headless-варіант.

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "pip uninstall -y opencv-contrib-python opencv-python 2>/dev/null || true",
    "pip install 'opencv-contrib-python-headless>=4.8.0'"
]
